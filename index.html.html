<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisasi & Modeling Data Subrogasi Per Tahun</title>
    <!-- Menggunakan Bootstrap 5 untuk tampilan yang rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS untuk membaca file Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 30px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; }
        .chart-container { position: relative; height: 450px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-12 text-center">
            <h2 class="fw-bold text-primary">Visualisasi & Modeling Data Subrogasi</h2>
            <p class="text-muted">Unggah file Excel Anda untuk melihat grafik perolehan per tahun dan garis tren modeling.</p>
        </div>
    </div>

    <!-- Antarmuka Upload File -->
    <div class="row mb-4 justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <label for="excelFile" class="form-label fw-bold">Pilih / Ganti File Excel (.xlsx, .xls)</label>
                <input class="form-control" type="file" id="excelFile" accept=".xlsx, .xls">
                <div class="form-text text-danger mt-2">
                    *Catatan: Pastikan kolom pertama berisi <strong>Tahun</strong> dan kolom kedua berisi <strong>Total Subrogasi</strong> (Angka).
                </div>
            </div>
        </div>
    </div>

    <!-- Area Grafik dan Data -->
    <div class="row">
        <!-- Grafik -->
        <div class="col-md-8 mb-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-3 text-secondary">Grafik Perolehan & Modeling </h5>
                <div class="chart-container">
                    <canvas id="subrogasiChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Preview Tabel Data -->
        <div class="col-md-4 mb-4">
            <div class="card p-4" style="max-height: 515px; overflow-y: auto;">
                <h5 class="fw-bold mb-3 text-secondary">Data Terbaca</h5>
                <div id="tableContainer" class="table-responsive">
                    <p class="text-muted text-center">Belum ada data yang diunggah.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    document.getElementById('excelFile').addEventListener('change', handleFile, false);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // Ambil sheet pertama
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Ubah sheet menjadi JSON array [[Tahun, Subrogasi], [2021, 50000000], ...]
            const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            prosesDanVisualisasikan(jsonData);
        };
        reader.readAsArrayBuffer(file);
    }

    function prosesDanVisualisasikan(data) {
        // Hapus baris kosong atau header jika teksnya bukan angka
        // Mengasumsikan baris pertama index 0 adalah Header (Tahun, Subrogasi)
        const headers = data[0];
        const rows = data.slice(1).filter(row => row.length >= 2 && !isNaN(row[0]));

        // Urutkan data berdasarkan tahun dari terkecil ke terbesar
        rows.sort((a, b) => a[0] - b[0]);

        const labelTahun = rows.map(row => row[0]);
        const nilaiSubrogasi = rows.map(row => parseFloat(row[1]) || 0);

        // --- MODELING DATA: Regresi Linear Sederhana untuk Garis Hubung Tren ---
        const n = rows.length;
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        
        // Menggunakan indeks (0, 1, 2...) sebagai X untuk kestabilan modeling tren waktu
        for (let i = 0; i < n; i++) {
            sumX += i;
            sumY += nilaiSubrogasi[i];
            sumXY += i * nilaiSubrogasi[i];
            sumXX += i * i;
        }
        
        // Rumus Gradien (m) dan Intersep (c) -> y = mx + c
        const gradien = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intersep = (sumY - gradien * sumX) / n;

        // Hitung nilai modeling tren untuk setiap titik tahun
        const nilaiModelingTren = [];
        for (let i = 0; i < n; i++) {
            nilaiModelingTren.push(gradien * i + intersep);
        }

        // --- TAMPILKAN TABEL PREVIEW ---
        tampilkanTabel(headers, rows);

        // --- BUAT / UPDATE GRAFIK CHART.JS ---
        tampilkanGrafik(labelTahun, nilaiSubrogasi, nilaiModelingTren);
    }

    function tampilkanTabel(headers, rows) {
        let html = `<table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>${headers[0] || 'Tahun'}</th>
                                <th>${headers[1] || 'Subrogasi'}</th>
                            </tr>
                        </thead>
                        <tbody>`;
        rows.forEach(row => {
            html += `<tr>
                        <td>${row[0]}</td>
                        <td>${Number(row[1]).toLocaleString('id-ID')}</td>
                     </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = html;
    }

    function tampilkanGrafik(labels, realData, trendData) {
        const ctx = document.getElementById('subrogasiChart').getContext('2d');
        
        // Hancurkan chart lama jika ada agar tidak tumpang tindih saat ganti file
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'bar', // Kombinasi: Bar untuk data riil, Line untuk modeling
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Perolehan Subrogasi Riil',
                        data: realData,
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        order: 2
                    },
                    {
                        label: 'Modeling Tren (Garis Regresi)',
                        data: trendData,
                        type: 'line', // Mengubah tipe khusus dataset ini menjadi garis penghubung
                        borderColor: 'rgba(255, 99, 132, 1)',
                        backgroundColor: 'transparent',
                        borderWidth: 3,
                        pointBackgroundColor: 'rgba(255, 99, 132, 1)',
                        tension: 0.1, // Membuat garis sedikit smooth
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return value.toLocaleString('id-ID');
                            }
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += Math.round(context.parsed.y).toLocaleString('id-ID');
                                }
                                return label;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
